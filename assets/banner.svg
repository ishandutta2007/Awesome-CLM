<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="accent-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1" stroke-opacity="0.3" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Abstract Causal Modeling Graphics (Neural Net & Mask representation) -->
  <!-- Glowing connection lines -->
  <g stroke="url(#accent-cyan)" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.6">
    <line x1="150" y1="100" x2="300" y2="250" />
    <line x1="300" y1="250" x2="450" y2="150" />
    <line x1="450" y1="150" x2="600" y2="300" />
    <line x1="600" y1="300" x2="750" y2="180" />
    <line x1="750" y1="180" x2="900" y2="280" />
  </g>

  <!-- Causal Masking Triangles (Symbolic representation) -->
  <polygon points="1000,100 1150,250 1000,250" fill="#ec4899" fill-opacity="0.15" stroke="url(#accent-pink)" stroke-width="2" filter="url(#glow)" />
  <line x1="1000" y1="100" x2="1150" y2="250" stroke="#06b6d4" stroke-width="3" />

  <!-- Nodes (Glowing Circles) -->
  <circle cx="150" cy="100" r="10" fill="#06b6d4" filter="url(#glow)" />
  <circle cx="300" cy="250" r="14" fill="#3b82f6" filter="url(#glow)" />
  <circle cx="450" cy="150" r="12" fill="#8b5cf6" filter="url(#glow)" />
  <circle cx="600" cy="300" r="16" fill="#ec4899" filter="url(#glow)" />
  <circle cx="750" cy="180" r="10" fill="#a855f7" filter="url(#glow)" />
  <circle cx="900" cy="280" r="12" fill="#06b6d4" filter="url(#glow)" />

  <!-- Title Text -->
  <text x="600" y="190" font-family="'Outfit', 'Inter', sans-serif" font-size="70" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
    AWESOME CLM
  </text>

  <!-- Subtitle Text -->
  <text x="600" y="240" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="6">
    CAUSAL LANGUAGE MODELING VARIANTS &amp; APPLICATIONS
  </text>

  <!-- Small details / Tech stats decoration -->
  <rect x="500" y="280" width="200" height="4" rx="2" fill="url(#accent-pink)" />
</svg>
